<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Elegant dark green background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03110d"/>
      <stop offset="100%" stop-color="#0a2a21"/>
    </linearGradient>

    <!-- Subtle contribution-style pattern -->
    <pattern id="contribGrid" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="9" height="9" rx="1.5" fill="#123c31" opacity="0.20"/>
    </pattern>

    <!-- Soft center fade for text readability -->
    <radialGradient id="centerFade" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#0a2a21" stop-opacity="0.88"/>
      <stop offset="50%" stop-color="#0a2a21" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0a2a21" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="900" height="300" rx="20" fill="url(#bg)"/>

  <!-- Full subtle grid -->
  <rect width="900" height="300" rx="20" fill="url(#contribGrid)"/>

  <!-- Sparse elegant edge accents -->
  <g>
    <!-- top -->
    <rect x="36" y="28" width="9" height="9" rx="1.5" fill="#2f7f67" opacity="0.45"/>
    <rect x="124" y="22" width="9" height="9" rx="1.5" fill="#4da98a" opacity="0.32"/>
    <rect x="210" y="38" width="9" height="9" rx="1.5" fill="#2f7f67" opacity="0.26"/>
    <rect x="332" y="24" width="9" height="9" rx="1.5" fill="#4da98a" opacity="0.22"/>
    <rect x="578" y="26" width="9" height="9" rx="1.5" fill="#2f7f67" opacity="0.24"/>
    <rect x="688" y="34" width="9" height="9" rx="1.5" fill="#4da98a" opacity="0.30"/>
    <rect x="812" y="24" width="9" height="9" rx="1.5" fill="#2f7f67" opacity="0.38"/>

    <!-- left -->
    <rect x="30" y="78" width="9" height="9" rx="1.5" fill="#4da98a" opacity="0.24"/>
    <rect x="46" y="138" width="9" height="9" rx="1.5" fill="#2f7f67" opacity="0.30"/>
    <rect x="26" y="214" width="9" height="9" rx="1.5" fill="#4da98a" opacity="0.22"/>

    <!-- right -->
    <rect x="854" y="68" width="9" height="9" rx="1.5" fill="#4da98a" opacity="0.26"/>
    <rect x="840" y="152" width="9" height="9" rx="1.5" fill="#2f7f67" opacity="0.34"/>
    <rect x="856" y="224" width="9" height="9" rx="1.5" fill="#4da98a" opacity="0.24"/>

    <!-- bottom -->
    <rect x="94" y="252" width="9" height="9" rx="1.5" fill="#2f7f67" opacity="0.28"/>
    <rect x="236" y="264" width="9" height="9" rx="1.5" fill="#4da98a" opacity="0.24"/>
    <rect x="640" y="258" width="9" height="9" rx="1.5" fill="#2f7f67" opacity="0.26"/>
    <rect x="772" y="248" width="9" height="9" rx="1.5" fill="#4da98a" opacity="0.30"/>
  </g>

  <!-- Cleaner center area -->
  <rect width="900" height="300" rx="20" fill="url(#centerFade)"/>

  <!-- Text -->
  <g text-anchor="middle">
    <text x="450" y="145"
          font-size="24"
          fill="#e7f5ee"
          font-family="'Times New Roman', Times, serif"
          font-weight="400"
          letter-spacing="0.3">
      <tspan opacity="0">
        Machine Learning
        <animate attributeName="opacity" values="0;1;1;0" dur="9s" repeatCount="indefinite"/>
      </tspan>
      <tspan opacity="0">
        Data Science
        <animate attributeName="opacity" values="0;0;1;1;0" dur="9s" repeatCount="indefinite"/>
      </tspan>
      <tspan opacity="0">
        Software Engineering
        <animate attributeName="opacity" values="0;0;0;1;1;0" dur="9s" repeatCount="indefinite"/>
      </tspan>
    </text>

    <text x="450" y="185"
          font-size="14"
          fill="#bdd9cd"
          font-family="'Times New Roman', Times, serif"
          font-weight="400"
          letter-spacing="0.2">
      Building autonomous AI systems &amp; data-driven applications
    </text>
  </g>
</svg>
