<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02140f"/>
      <stop offset="100%" stop-color="#0b3d2e"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip typing -->
    <clipPath id="clipName">
      <rect width="0" height="80">
        <animate attributeName="width"
          values="0;700;700;0"
          keyTimes="0;0.4;0.7;1"
          dur="6s"
          repeatCount="indefinite"/>
      </rect>
    </clipPath>

  </defs>

  <!-- Base -->
  <rect width="900" height="300" rx="20" fill="url(#bg)"/>

  <!-- 🟩 FULLSCREEN PULSATING HEATMAP GRID -->
  <g opacity="0.95">

    <!-- Generate a dense grid -->
    <!-- rows: 0 to 300, cols: 0 to 900 -->
    <!-- each square = 10x10, spacing = 14 -->

    <g transform="translate(20,20)">

      <!-- ROW 1 -->
      <g>
        <rect x="0" y="0" width="10" height="10" fill="#022c22">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="0s" repeatCount="indefinite"/>
        </rect>
        <rect x="14" y="0" width="10" height="10" fill="#064e3b">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" begin="0.2s" repeatCount="indefinite"/>
        </rect>
        <rect x="28" y="0" width="10" height="10" fill="#065f46">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="0.4s" repeatCount="indefinite"/>
        </rect>
        <rect x="42" y="0" width="10" height="10" fill="#10b981">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" begin="0.6s" repeatCount="indefinite"/>
        </rect>
        <rect x="56" y="0" width="10" height="10" fill="#022c22">
          <animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.3s" begin="0.1s" repeatCount="indefinite"/>
        </rect>
        <rect x="70" y="0" width="10" height="10" fill="#34d399">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="3.7s" begin="0.3s" repeatCount="indefinite"/>
        </rect>
        <rect x="84" y="0" width="10" height="10" fill="#065f46">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="4.8s" begin="0.5s" repeatCount="indefinite"/>
        </rect>
        <rect x="98" y="0" width="10" height="10" fill="#022c22">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" begin="0.7s" repeatCount="indefinite"/>
        </rect>
        <rect x="112" y="0" width="10" height="10" fill="#10b981">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="4.2s" begin="0.9s" repeatCount="indefinite"/>
        </rect>
        <rect x="126" y="0" width="10" height="10" fill="#064e3b">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="5.2s" begin="1.1s" repeatCount="indefinite"/>
        </rect>
        <rect x="140" y="0" width="10" height="10" fill="#022c22">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" begin="1.3s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- ROW 2 -->
      <g transform="translate(0,14)">
        <rect x="0" y="0" width="10" height="10" fill="#065f46">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="0.2s" repeatCount="indefinite"/>
        </rect>
        <rect x="14" y="0" width="10" height="10" fill="#022c22">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="4.1s" begin="0.4s" repeatCount="indefinite"/>
        </rect>
        <rect x="28" y="0" width="10" height="10" fill="#10b981">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" begin="0.6s" repeatCount="indefinite"/>
        </rect>
        <rect x="42" y="0" width="10" height="10" fill="#34d399">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="4.7s" begin="0.8s" repeatCount="indefinite"/>
        </rect>
        <rect x="56" y="0" width="10" height="10" fill="#022c22">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="3.3s" begin="1s" repeatCount="indefinite"/>
        </rect>
        <rect x="70" y="0" width="10" height="10" fill="#065f46">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="4.4s" begin="1.2s" repeatCount="indefinite"/>
        </rect>
        <rect x="84" y="0" width="10" height="10" fill="#10b981">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" begin="1.4s" repeatCount="indefinite"/>
        </rect>
        <rect x="98" y="0" width="10" height="10" fill="#022c22">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" begin="1.6s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- ROW 3 (more depth) -->
      <g transform="translate(0,28)">
        <rect x="0" y="0" width="10" height="10" fill="#022c22">
          <animate attributeName="opacity" values="0.2;0.9;0.2" dur="4s" begin="0.1s" repeatCount="indefinite"/>
        </rect>
        <rect x="14" y="0" width="10" height="10" fill="#10b981">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
        </rect>
        <rect x="28" y="0" width="10" height="10" fill="#065f46">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="4.2s" begin="0.5s" repeatCount="indefinite"/>
        </rect>
        <rect x="42" y="0" width="10" height="10" fill="#34d399">
          <animate attributeName="opacity" values="0.4;1;0.4" dur="3.9s" begin="0.7s" repeatCount="indefinite"/>
        </rect>
      </g>

    </g>
  </g>

  <!-- Atlas watermark -->
  <text x="50%" y="52%" text-anchor="middle"
        font-size="120"
        fill="#34d399"
        opacity="0.03"
        font-family="Segoe UI, sans-serif">
    ATLAS
  </text>

  <!-- CENTER CONTENT -->
  <g text-anchor="middle">

    <animateTransform attributeName="transform"
      type="translate"
      values="0 0; 0 -6; 0 0"
      dur="4s"
      repeatCount="indefinite"/>

    <!-- Name -->
    <g clip-path="url(#clipName)">
      <text x="450" y="135" font-size="42" fill="#d1fae5"
            font-family="Segoe UI, sans-serif" font-weight="600"
            filter="url(#glow)">
        Hi, I'm Maryam 👋
      </text>
    </g>

    <!-- Roles -->
    <text x="450" y="175" font-size="22" fill="#a7f3d0"
          font-family="Segoe UI, sans-serif"
          filter="url(#glow)">

      <tspan opacity="0">
        Machine Learning
        <animate attributeName="opacity" values="0;1;1;0" dur="9s" repeatCount="indefinite"/>
      </tspan>

      <tspan opacity="0">
        Data Science
        <animate attributeName="opacity" values="0;0;1;1;0" dur="9s" repeatCount="indefinite"/>
      </tspan>

      <tspan opacity="0">
        Software Engineering
        <animate attributeName="opacity" values="0;0;0;1;1;0" dur="9s" repeatCount="indefinite"/>
      </tspan>

    </text>

    <!-- Tagline -->
    <text x="450" y="220" font-size="16" fill="#6ee7b7"
          font-family="Segoe UI, sans-serif"
          filter="url(#glow)">
      Building autonomous AI systems & data-driven applications
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </text>

  </g>

</svg>

